name: Android CI
on: [push, pull_request]
jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Check conflict markers
        run: ./scripts/check_conflicts.sh
      - name: Tests
        run: ./gradlew test
