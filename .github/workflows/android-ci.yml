name: Android CI
on: [push, pull_request]
jobs:
  unit-tests:
    runs-on: ubuntu-latest
    env:
      ANDROID_HOME: /usr/lib/android-sdk
      ANDROID_SDK_ROOT: /usr/lib/android-sdk
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - uses: android-actions/setup-android@v3

      - name: Configure Android SDK environment
        shell: bash
        run: |
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> "$GITHUB_PATH"
          echo "$ANDROID_HOME/platform-tools" >> "$GITHUB_PATH"
          echo "$ANDROID_HOME/tools" >> "$GITHUB_PATH"

      - name: Install required Android SDK packages
        shell: bash
        run: |
          yes | sdkmanager --sdk_root="$ANDROID_HOME" \
            "build-tools;25.0.1" \
            "platforms;android-25"

      - name: Ensure gradlew is executable
        run: chmod +x ./gradlew

      - name: Generate Gradle wrapper (if missing)
        shell: bash
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            mkdir -p /tmp/wrapper-bootstrap
            echo 'rootProject.name = "wrapper-bootstrap"' > /tmp/wrapper-bootstrap/settings.gradle.kts
            echo 'tasks.register("noop")' > /tmp/wrapper-bootstrap/build.gradle.kts
            (cd /tmp/wrapper-bootstrap && gradle wrapper --gradle-version 8.10.2 --no-validate-url)
            cp /tmp/wrapper-bootstrap/gradle/wrapper/gradle-wrapper.jar gradle/wrapper/gradle-wrapper.jar
          fi

      - name: Check conflict markers
        run: ./scripts/check_conflicts.sh

      - name: Resolve all dependencies
        run: ./gradlew resolveAllDependencies

      - name: Tests
        run: ./gradlew test
