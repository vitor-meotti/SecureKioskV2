name: Android CI
on: [push, pull_request]
jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Generate Gradle wrapper (if missing)
        shell: bash
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            mkdir -p /tmp/wrapper-bootstrap
            echo 'rootProject.name = "wrapper-bootstrap"' > /tmp/wrapper-bootstrap/settings.gradle.kts
            echo 'tasks.register("noop")' > /tmp/wrapper-bootstrap/build.gradle.kts
            (cd /tmp/wrapper-bootstrap && gradle wrapper --gradle-version 8.10.2 --no-validate-url)
            cp /tmp/wrapper-bootstrap/gradle/wrapper/gradle-wrapper.jar gradle/wrapper/gradle-wrapper.jar
          fi

      - name: Check conflict markers
        run: ./scripts/check_conflicts.sh

      - name: Tests
        run: ./gradlew test
