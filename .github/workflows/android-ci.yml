name: Android CI
on: [push, pull_request]
jobs:
  unit-tests:
    runs-on: ubuntu-latest
    env:
      ANDROID_HOME: /home/runner/android-sdk
      ANDROID_SDK_ROOT: /home/runner/android-sdk
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - uses: android-actions/setup-android@v3
        with:
          sdk-location: /home/runner/android-sdk

      - name: Configure Android SDK environment
        shell: bash
        run: |
          echo "$ANDROID_HOME/cmdline-tools/latest/bin" >> "$GITHUB_PATH"
          echo "$ANDROID_HOME/platform-tools" >> "$GITHUB_PATH"
          echo "$ANDROID_HOME/build-tools/35.0.0" >> "$GITHUB_PATH"
          echo "$ANDROID_HOME/tools" >> "$GITHUB_PATH"


      - name: Accept Android SDK licenses
        shell: bash
        run: yes | sdkmanager --sdk_root="$ANDROID_HOME" --licenses >/dev/null

      - name: Setup Android toolchain
        shell: bash
        run: ./scripts/setup_android_env.sh

      - name: Ensure gradlew is executable
        run: chmod +x ./gradlew

      - name: Bootstrap Gradle wrapper jar (if missing)
        shell: bash
        run: ./scripts/bootstrap_gradle_wrapper.sh

      - name: Check conflict markers
        run: ./scripts/check_conflicts.sh

      - name: Resolve all dependencies
        run: ./gradlew resolveAllDependencies

      - name: Tests
        run: ./gradlew test
